 class="nodes"><g transform="translate(134.390625, 84.5)" id="flowchart-A1-0" class="node default"><rect height="78" width="182.78125" y="-39" x="-91.390625" style="" class="basic label-container"/><g transform="translate(-61.390625, -24)" style="" class="label"><rect/><foreignObject height="48" width="122.78125"><div style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span class="nodeLabel"><p>Mutex: serialized<br />throughput = 1x</p></span></div></foreignObject></g></g><g transform="translate(394.7421875, 84.5)" id="flowchart-A2-1" class="node default"><rect height="78" width="237.921875" y="-39" x="-118.9609375" style="fill:#dcfce7 !important;stroke:#14532d !important" class="basic label-container"/><g transform="translate(-88.9609375, -24)" style="" class="label"><rect/><foreignObject height="48" width="177.921875"><div style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span class="nodeLabel"><p>R/W Lock: parallel reads<br />throughput = ~Nx</p></span></div></foreignObject></g></g></g></g></g></g></g></svg>